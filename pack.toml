[pack]
name = "cognition-idea-factory"
schema = 2

[[agent]]
name = "mayor"
prompt_template = "agents/mayor/prompt.template.md"

[[agent]]
name = "generator"
prompt_template = "agents/generator/prompt.template.md"

[[agent]]
name = "critic"
prompt_template = "agents/critic/prompt.template.md"

[[agent]]
name = "synthesizer"
prompt_template = "agents/synthesizer/prompt.template.md"

[[named_session]]
template = "mayor"
mode = "always"
